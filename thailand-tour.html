<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thailand Tour Packages - NextTrip Holidays</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>
  <script src="script.js" defer></script>
  
  <!-- Lottie Player -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>

  <!-- Premium Page Loader -->
  <div id="premiumLoader">
    <div class="loader-earth">
      <lottie-player src="https://lottie.host/df254881-c7c4-42f1-aa8f-28c0570bde7c/55u6YkF8Wb.json" background="transparent" speed="1" style="width: 220px; height: 220px;" loop autoplay></lottie-player>
    </div>
    <div class="loader-text">NextTrip Holidays</div>
  </div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('premiumLoader');
        if (loader) loader.classList.add('fade-out');
        document.body.classList.add('body-loaded');
      }, 900);
    });
    document.querySelectorAll('a').forEach(link => {
      if (link.target !== '_blank' && link.href && link.href.indexOf('#') === -1 && !link.href.startsWith('tel:') && !link.href.startsWith('mailto:')) {
        link.addEventListener('click', (e) => {
          const loader = document.getElementById('premiumLoader');
          if (loader) {
            e.preventDefault();
            loader.classList.remove('fade-out');
            loader.style.opacity = '1';
            loader.style.transform = 'translateY(0)';
            setTimeout(() => window.location = link.href, 500);
          }
        });
      }
    });
  </script>

  <nav class="navbar" style="background: var(--dark);">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="https://res.cloudinary.com/drkgkgiat/image/upload/q_auto/f_auto/v1775567539/Next_TRip_Final_Logo_Square_Size_-_Copy-removebg-preview_bsfsev.png"
          alt="NextTrip" height="50">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="international-packages.html" class="active">International</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main style="padding-top: 140px; background: white;">
    <div class="container">
      <div class="dt-header"
        style="display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
        <div class="dt-header-left" style="display: flex; gap: 30px; align-items: flex-start;">
          <div class="dt-count"
            style="text-align: center; border-right: 1px solid #eee; padding-right: 30px; margin-top: 5px;">
            <span style="display: block; font-size: 52px; color: var(--primary); font-weight: 700;">12</span>
            <span style="display: block; font-size: 16px; color: #888; line-height: 1.2; margin-top: 8px;">Thai<br>Packs</span>
          </div>
          <div class="dt-title-area">
            <h1
              style="font-family: 'Playfair Display', serif; font-size: 46px; margin-bottom: 12px; color: var(--dark); font-weight: 700;">
              Amazing Thailand</h1>
            <p style="color: var(--text); font-weight: 600; font-size: 17px;"><i class="fa fa-shrine"
                style="color: var(--primary); margin-right: 8px;"></i> Golden Temples & Tropical Islands</p>
          </div>
        </div>
        <button class="btn-primary" onclick="openBookingModal()"
          style="background: var(--primary); color: white; padding: 14px 35px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; height: fit-content;">Book
          Now</button>
      </div>

      <div class="dt-image-area"
        style="position: relative; border-radius: 20px; overflow: hidden; margin-bottom: 60px; height: 450px;">
        <img src="https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?w=1600"
          style="width: 100%; height: 100%; object-fit: cover;">
        <div style="position: absolute; bottom: 40px; left: 40px; color: white;">
          <h2 style="font-family: 'Playfair Display', serif; font-size: 32px; margin: 0;">The Land of Smiles</h2>
          <p style="opacity: 0.9;">Exploring the vibrant culture and pristine beaches</p>
        </div>
      </div>

      <div id="packageGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 80px;"></div>
    </div>
  </main>

  <!-- Itinerary Modal -->
  <div class="itinerary-modal" id="itineraryModal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); z-index: 10000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
    <div class="modal-content"
      style="background: white; width: 100%; max-width: 750px; max-height: 85vh; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: fadeUp 0.4s ease;">
      <!-- Header -->
      <div
        style="padding: 24px 30px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fafafa;">
        <div>
          <h2 id="modalTitle"
            style="font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 6px; color: var(--dark);">
            Tour Itinerary</h2>
          <span id="modalDuration" style="font-size: 14px; color: var(--text-light); font-weight: 500;"><i
              class="fa fa-clock" style="color: var(--primary); margin-right: 6px;"></i> Loading...</span>
        </div>
        <button onclick="closeItinerary()"
          style="width: 40px; height: 40px; border-radius: 50%; background: #eee; border: none; font-size: 18px; color: #555; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s;"
          onmouseover="this.style.background='#ddd'" onmouseout="this.style.background='#eee'"><i
            class="fa fa-times"></i></button>
      </div>
      <!-- Body -->
      <div style="padding: 30px; overflow-y: auto; flex: 1; background: white;">
        <div id="modalItineraryList" style="display: flex; flex-direction: column; gap: 0;"></div>
      </div>
      <!-- Footer -->
      <div
        style="padding: 20px 30px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fafafa;">
        <div id="modalPrice" style="font-size: 20px; font-weight: 700; color: var(--dark);"></div>
        <button onclick="openBookingModal()"
          style="background: var(--primary); color: white; border: none; padding: 14px 36px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(242, 140, 0, 0.3);"
          onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">Book This
          Tour</button>
      </div>
    </div>
  </div>

  <script>
    const thaiData = {
      'th1': {
        title: 'Essential Thailand', dur: '5D/4N', price: '₹ 38,000', img: 'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?w=600',
        days: [
          { t: 'Bangkok Arrival', c: 'Traditional welcome at airport, private transfer to hotel. Evening free to explore Sukhumvit.' },
          { t: 'Bangkok City Tour', c: 'Visit Grand Palace, Wat Pho (Reclining Buddha), and Wat Arun. Evening Chao Phraya River cruise.' },
          { t: 'Transfer to Phuket', c: 'Short flight to Phuket. Check into beach resort. Evening free at Patong Beach.' },
          { t: 'Phi Phi Island Tour', c: 'Full day speedboat tour to Phi Phi Islands, Maya Bay, and Khai Island with snorkeling.' },
          { t: 'Departure', c: 'Last minute shopping at Jungceylon and transfer to Phuket airport.' }
        ]
      },
      'th2': {
        title: 'Northern Culture', dur: '6D/5N', price: '₹ 45,000', img: 'https://images.unsplash.com/photo-1599423300746-b62533397364?w=600',
        days: [
          { t: 'Chiang Mai Arrival', c: 'Arrival and transfer to hotel. Evening Night Bazaar visit.' },
          { t: 'Doi Suthep Temple', c: 'Visit the mountain temple Wat Phra That Doi Suthep. Afternoon Thai cooking class.' },
          { t: 'Chiang Rai Trip', c: 'Day trip to the White Temple (Wat Rong Khun) and Blue Temple.' },
          { t: 'Elephant Sanctuary', c: 'Ethical elephant interaction and feeding. Learning about conservation.' },
          { t: 'Old City Temples', c: 'Walking tour of Wat Chedi Luang and Wat Phra Singh.' },
          { t: 'Departure', c: 'Transfer to Chiang Mai airport.' }
        ]
      },
      'th3': {
        title: 'Island Hopping Luxury', dur: '7D/6N', price: '₹ 72,000', img: 'https://images.unsplash.com/photo-1528127269322-539801943592?w=600',
        days: [
          { t: 'Krabi Arrival', c: 'Private transfer to luxury resort. Evening sunset at Ao Nang beach.' },
          { t: '4 Islands Tour', c: 'Private longtail boat tour to Phra Nang Cave, Tup Island, Chicken Island, and Poda Island.' },
          { t: 'Hong Island Trip', c: 'Visit the stunning lagoon and viewpoints of Hong Island.' },
          { t: 'Transfer to Koh Samui', c: 'Ferry/Flight to Koh Samui. Evening at Fisherman\'s Village.' },
          { t: 'Angthong Marine Park', c: 'Full day luxury cruise to the marine park for kayaking and snorkeling.' },
          { t: 'Traditional Spa Day', c: 'Full day of Thai traditional massage and rejuvenating treatments.' },
          { t: 'Departure', c: 'Private transfer to Samui airport.' }
        ]
      }
    };

    const grid = document.getElementById('packageGrid');
    Object.keys(thaiData).forEach(id => {
      const pkg = thaiData[id];
      grid.innerHTML += `
        <div class="itinerary-card" onclick="showDetailedProgram('${id}')" style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); cursor: pointer; border: 1px solid #f0f0f0; transition: 0.3s;">
          <div style="position: relative; height: 220px; overflow: hidden;">
            <img src="${pkg.img}" class="pkg-img" style="width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease;">
          </div>
          <div style="padding: 24px;">
            <h3 style="font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 10px;">${pkg.title}</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;"><i class="fa fa-clock" style="color: var(--primary); margin-right: 6px;"></i> ${pkg.dur}</p>
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 16px;">
              <span style="font-weight: 700; color: #333; font-size: 18px;">${pkg.price}</span>
              <span style="color: var(--primary); font-size: 13px; font-weight: 700;">VIEW PROGRAM <i class="fa fa-chevron-right" style="margin-left:4px"></i></span>
            </div>
          </div>
        </div>`;
    });

    function showDetailedProgram(id) {
      const data = thaiData[id];
      if (!data) return;

      document.getElementById('modalTitle').innerText = data.title;
      document.getElementById('modalDuration').innerHTML = `<i class="fa fa-clock" style="color: var(--primary); margin-right: 6px;"></i> ${data.dur}`;
      document.getElementById('modalPrice').innerText = data.price;

      const list = document.getElementById('modalItineraryList');
      list.innerHTML = data.days.map((d, index) => {
        const isLast = index === data.days.length - 1;
        return `
        <div style="display: flex; gap: 24px;">
          <div style="flex-shrink: 0; display: flex; flex-direction: column; align-items: center; width: 44px;">
            <div style="width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 2px solid var(--primary); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-shadow: 0 4px 10px rgba(242, 140, 0, 0.1); z-index: 2;">${index + 1}</div>
            ${!isLast ? '<div style="width: 2px; height: 100%; background: #eaeaea; margin: 4px 0; min-height: 40px;"></div>' : ''}
          </div>
          <div style="padding-bottom: ${isLast ? '0' : '30px'}; padding-top: 5px;">
            <div style="font-size: 13px; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Day ${index + 1}</div>
            <h4 style="font-size: 20px; color: var(--dark); margin-bottom: 10px; font-family: 'Playfair Display', serif;">${d.t}</h4>
            <p style="color: #666; font-size: 15px; line-height: 1.6; margin: 0;">${d.c}</p>
          </div>
        </div>`;
      }).join('');

      const modal = document.getElementById('itineraryModal');
      modal.style.display = 'flex';
      setTimeout(() => modal.style.opacity = '1', 10);
      document.body.style.overflow = 'hidden';
    }

    function closeItinerary() {
      const modal = document.getElementById('itineraryModal');
      if (modal) {
        modal.style.opacity = '0';
        setTimeout(() => modal.style.display = 'none', 400);
        document.body.style.overflow = 'auto';
      }
    }

    
    function openBookingModal() { 
        if(typeof window.openModal === "function") {
            window.openModal(); 
        } else {
            console.warn("Global booking system not ready");
            alert("Booking system is loading. Please try again in a moment.");
        }
    }

      
        // Close modal on outside click
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('itineraryModal');
      if (e.target === modal) closeItinerary();
    });
  </script>
</body>

</html>
